name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        id: check
        run: echo "has_token=${{ secrets.VERCEL_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.check.outputs.has_token == 'true'
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: steps.check.outputs.has_token == 'true'
        run: npm install -g vercel

      - name: Pull Vercel environment
        if: steps.check.outputs.has_token == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: my-app
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        if: steps.check.outputs.has_token == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: my-app
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy
        if: steps.check.outputs.has_token == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: my-app
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-lambda:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        id: check
        run: echo "has_aws=${{ secrets.AWS_ACCESS_KEY_ID != '' }}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.check.outputs.has_aws == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-app/server/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.has_aws == 'true'
        run: npm install
        working-directory: my-app/server

      - name: Install Serverless Framework
        if: steps.check.outputs.has_aws == 'true'
        run: npm install -g serverless@3

      - name: Deploy
        if: steps.check.outputs.has_aws == 'true'
        run: serverless deploy --stage production
        working-directory: my-app/server
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

  deploy-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: meta
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: my-app
          file: my-app/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}:latest
            ghcr.io/${{ steps.meta.outputs.repo }}:${{ github.sha }}
