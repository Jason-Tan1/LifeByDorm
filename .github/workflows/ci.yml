name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  client:
    name: Client — Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-app/client/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: my-app/client

      - name: Lint
        run: npm run lint
        working-directory: my-app/client

      - name: Typecheck
        run: npx tsc -b --noEmit
        working-directory: my-app/client

      - name: Test
        run: npm run test:run
        working-directory: my-app/client

      - name: Build
        run: npm run build
        working-directory: my-app/client

  server:
    name: Server — Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-app/server/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: my-app/server

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: my-app/server

      - name: Test
        run: npm test
        working-directory: my-app/server

      - name: Build
        run: npm run build
        working-directory: my-app/server
